<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint - UI Editor Preview</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f5f5f5;
  --bg-tertiary: #e8e8e8;
  --border-color: #d4d4d4;
  --text-primary: #1e1e1e;
  --text-secondary: #6b6b6b;
  --accent: #0078d4;
  --accent-light: #e6f2ff;
  --selection: #0078d4;
  --panel-width: 240px;
  --toolbar-height: 36px;
  --titlebar-height: 32px;
  --statusbar-height: 24px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 13px;
  color: var(--text-primary);
}

body { overflow: hidden; background: var(--bg-primary); }

#root {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* TitleBar */
.titlebar {
  height: var(--titlebar-height);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: var(--text-secondary);
  user-select: none;
  flex-shrink: 0;
}
.titlebar .brand { margin-left: 8px; opacity: 0.5; }

/* Toolbar */
.toolbar {
  height: var(--toolbar-height);
  background: var(--bg-primary);
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 2px;
  flex-shrink: 0;
}
.toolbar-divider {
  width: 1px;
  height: 20px;
  background: var(--border-color);
  margin: 0 6px;
}
.tool-button {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border: none;
  border-radius: 4px;
  background: transparent;
  cursor: pointer;
  color: var(--text-primary);
}
.tool-button:hover { background: var(--bg-tertiary); }
.tool-button.disabled { opacity: 0.3; pointer-events: none; }

/* Main area */
.main-area {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ComponentPanel */
.component-panel {
  width: var(--panel-width);
  border-right: 1px solid var(--border-color);
  background: var(--bg-primary);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}
.component-search {
  padding: 8px;
}
.component-search input {
  width: 100%;
  padding: 4px 8px;
  border: 1px solid var(--border-color);
  border-radius: 4px;
  outline: none;
  font-size: 12px;
  background: var(--bg-secondary);
  font-family: inherit;
}
.component-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 8px 8px;
}
.category-title {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
  margin-top: 8px;
}
.component-item {
  padding: 3px 8px;
  border-radius: 3px;
  cursor: grab;
  font-size: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.component-item:hover {
  background: var(--bg-tertiary);
}
.component-item:hover .comp-desc { display: inline; }
.comp-desc {
  display: none;
  font-size: 10px;
  color: var(--text-secondary);
}

/* Canvas */
.canvas-area {
  flex: 1;
  background: var(--bg-tertiary);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: auto;
}
.canvas-frame {
  background: var(--bg-primary);
  border-radius: 4px;
  border: 1px solid var(--border-color);
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  min-width: 360px;
  min-height: 480px;
  max-width: 420px;
  width: 100%;
  overflow: hidden;
}

/* Canvas内の要素 */
.canvas-node { cursor: pointer; position: relative; }
.canvas-node.selected { outline: 2px solid var(--selection); outline-offset: -1px; }
.canvas-node:hover:not(.selected) { outline: 1px dashed var(--accent); outline-offset: -1px; }

/* PropertyPanel */
.property-panel {
  width: var(--panel-width);
  border-left: 1px solid var(--border-color);
  background: var(--bg-primary);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}
.tab-bar {
  display: flex;
  border-bottom: 1px solid var(--border-color);
}
.tab-button {
  flex: 1;
  padding: 6px 0;
  border: none;
  border-bottom: 2px solid transparent;
  background: transparent;
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
}
.tab-button.active {
  border-bottom-color: var(--accent);
  color: var(--accent);
}
.prop-content {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.prop-header {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 12px;
  padding: 4px 8px;
  background: var(--accent-light);
  border-radius: 3px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.prop-header .delete-btn {
  background: transparent;
  border: none;
  cursor: pointer;
  color: var(--accent);
  font-size: 12px;
  padding: 0 4px;
}
.prop-section-title {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: 0.5px;
  margin-bottom: 4px;
  margin-top: 8px;
}
.prop-row {
  display: flex;
  align-items: center;
  margin-bottom: 2px;
  gap: 4px;
}
.prop-label {
  width: 70px;
  font-size: 11px;
  color: var(--text-secondary);
  flex-shrink: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.prop-input-wrapper {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 4px;
}
.prop-input {
  flex: 1;
  padding: 2px 6px;
  border: 1px solid transparent;
  border-radius: 3px;
  font-size: 11px;
  background: var(--bg-secondary);
  outline: none;
  min-width: 0;
  font-family: inherit;
}
.prop-input:focus {
  border-color: var(--accent);
}
.color-swatch {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border-color);
  border-radius: 2px;
  padding: 0;
  cursor: pointer;
  flex-shrink: 0;
}

/* TreeView */
.tree-node {
  padding: 2px 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  border-radius: 2px;
  font-size: 12px;
}
.tree-node:hover { background: var(--bg-secondary); }
.tree-node.selected { background: var(--accent-light); }
.tree-node.selected .tree-tag { color: var(--accent); }
.tree-toggle {
  font-size: 10px;
  width: 10px;
  text-align: center;
  color: var(--text-secondary);
  cursor: pointer;
  flex-shrink: 0;
}
.tree-name {
  color: var(--text-secondary);
  font-size: 10px;
}

/* StatusBar */
.statusbar {
  height: var(--statusbar-height);
  background: var(--bg-secondary);
  border-top: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  padding: 0 12px;
  font-size: 11px;
  color: var(--text-secondary);
  gap: 16px;
  flex-shrink: 0;
}

/* Placeholder */
.empty-message {
  color: var(--text-secondary);
  font-size: 12px;
  padding: 16px;
  text-align: center;
}

/* scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #a0a0a0; }
</style>
</head>
<body>

<div id="root">

  <!-- TitleBar -->
  <div class="titlebar">
    <span>login.ui <span style="color: var(--accent);">•</span></span>
    <span class="brand">— Blueprint</span>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="tool-button" title="ファイルを開く (Ctrl+O)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M1.5 2.5h5l1.5 1.5h6.5v9h-13v-10.5z" stroke="currentColor" stroke-width="1" fill="none"/>
      </svg>
    </button>
    <button class="tool-button" title="保存 (Ctrl+S)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 1h9.5l2.5 2.5v10.5h-12v-13z" stroke="currentColor" stroke-width="1" fill="none"/>
        <rect x="4" y="1" width="5" height="4" stroke="currentColor" stroke-width="1" fill="none"/>
        <rect x="4" y="9" width="8" height="4" stroke="currentColor" stroke-width="1" fill="none"/>
      </svg>
    </button>
    <div class="toolbar-divider"></div>
    <button class="tool-button" title="元に戻す (Ctrl+Z)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 8h7a3 3 0 010 6h-2M3 8l3-3M3 8l3 3" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="tool-button" title="やり直す (Ctrl+Shift+Z)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M13 8H6a3 3 0 000 6h2M13 8l-3-3M13 8l-3 3" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="toolbar-divider"></div>
    <button class="tool-button" title="選択ツール (V)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 2l3.5 12 1.5-4.5 4.5-1.5L3 2z" stroke="currentColor" stroke-width="1" fill="none"/>
      </svg>
    </button>
  </div>

  <!-- Main -->
  <div class="main-area">

    <!-- ComponentPanel -->
    <div class="component-panel">
      <div class="component-search">
        <input type="text" placeholder="コンポーネントを検索..." id="comp-search">
      </div>
      <div class="component-list" id="comp-list">
        <!-- JS で生成 -->
      </div>
    </div>

    <!-- Canvas -->
    <div class="canvas-area" id="canvas-area">
      <div class="canvas-frame">
        <!-- Screen: login -->
        <div class="canvas-node" data-node="screen" style="padding: 24px;">
          <!-- VStack -->
          <div class="canvas-node" data-node="vstack" style="display:flex; flex-direction:column; gap:16px;">
            <!-- Text -->
            <div class="canvas-node" data-node="text" style="font-size:24px; font-weight:bold;">ログイン</div>
            <!-- Input: email -->
            <input class="canvas-node" data-node="input-email" type="text" placeholder="メールアドレス" readonly
              style="padding:8px 12px; border:1px solid var(--border-color); border-radius:4px; font-size:14px; width:100%; background:var(--bg-primary); font-family:inherit;">
            <!-- Input: password -->
            <input class="canvas-node" data-node="input-pw" type="password" placeholder="パスワード" readonly
              style="padding:8px 12px; border:1px solid var(--border-color); border-radius:4px; font-size:14px; width:100%; background:var(--bg-primary); font-family:inherit;">
            <!-- Button -->
            <button class="canvas-node" data-node="button"
              style="padding:8px 16px; background-color:#3B82F6; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:500; width:100%; cursor:pointer; font-family:inherit;">
              ログイン
            </button>
            <!-- Link -->
            <a class="canvas-node" data-node="link"
              style="color:var(--accent); text-decoration:none; font-size:13px; cursor:pointer;">
              パスワードを忘れた方
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- PropertyPanel -->
    <div class="property-panel">
      <div class="tab-bar">
        <button class="tab-button active" id="tab-props" onclick="switchTab('props')">Properties</button>
        <button class="tab-button" id="tab-tree" onclick="switchTab('tree')">Tree</button>
      </div>
      <div class="prop-content" id="prop-content">
        <div class="empty-message">要素を選択してプロパティを編集</div>
      </div>
      <div class="prop-content" id="tree-content" style="display:none;">
        <!-- TreeView -->
      </div>
    </div>

  </div>

  <!-- StatusBar -->
  <div class="statusbar">
    <span id="status-text">要素を選択してください</span>
  </div>

</div>

<script>
// --- Component Data ---
const TAG_CATEGORIES = {
  LAYOUT: ['Screen','VStack','HStack','Grid','Box','ScrollView','SplitScreen','HeroSection','BentoGrid'],
  CONTENT: ['Text','Image','Icon','Divider','Avatar','Badge','Tag','ProgressBar','Skeleton','StatCard','Chart'],
  INPUT: ['Button','Input','Textarea','Select','Checkbox','Radio','Toggle','Slider','DatePicker','FileUpload','SearchBar','Autocomplete','TagInput','OTPInput','ColorPicker','Link'],
  NAVIGATION: ['Navbar','Sidebar','Breadcrumb','Pagination','Tabs','Stepper','AppBar'],
  COMPOSITE: ['Card','Modal','Table','Accordion','Carousel','Kanban','Timeline','List','Tree','PricingTable','FAQSection','NotificationPanel'],
  FEEDBACK: ['Toast','Alert','Tooltip','Popover','Spinner','ConfirmDialog','EmptyState'],
};

const TAG_DESCRIPTIONS = {
  Screen:'1画面全体のルートコンテナ', VStack:'縦並びコンテナ', HStack:'横並びコンテナ',
  Grid:'グリッドレイアウト', Box:'汎用コンテナ', ScrollView:'スクロール可能なコンテナ',
  SplitScreen:'左右2分割レイアウト', HeroSection:'ヒーローセクション', BentoGrid:'ベントグリッド',
  Text:'テキスト表示', Image:'画像表示', Icon:'アイコン表示', Divider:'区切り線',
  Avatar:'ユーザーアバター', Badge:'通知バッジ', Tag:'タグ/チップ',
  ProgressBar:'プログレスバー', Skeleton:'スケルトンスクリーン', StatCard:'統計カード', Chart:'チャート・グラフ',
  Button:'ボタン', Input:'1行テキスト入力', Textarea:'複数行テキスト入力', Select:'ドロップダウン',
  Checkbox:'チェックボックス', Radio:'ラジオボタン', Toggle:'トグルスイッチ', Slider:'スライダー',
  DatePicker:'日付選択', FileUpload:'ファイルアップロード', SearchBar:'検索バー',
  Autocomplete:'オートコンプリート', TagInput:'タグ入力', OTPInput:'OTP入力',
  ColorPicker:'カラーピッカー', Link:'リンク',
  Navbar:'上部ナビゲーションバー', Sidebar:'左サイドバーナビ', Breadcrumb:'パンくずリスト',
  Pagination:'ページネーション', Tabs:'タブ', Stepper:'ステッパー', AppBar:'モバイルアプリバー',
  Card:'カード', Modal:'モーダル', Table:'テーブル', Accordion:'アコーディオン',
  Carousel:'カルーセル', Kanban:'カンバンボード', Timeline:'タイムライン',
  List:'リストビュー', Tree:'ツリービュー', PricingTable:'料金テーブル',
  FAQSection:'FAQセクション', NotificationPanel:'通知パネル',
  Toast:'トースト通知', Alert:'アラート/バナー', Tooltip:'ツールチップ',
  Popover:'ポップオーバー', Spinner:'ローディングスピナー', ConfirmDialog:'確認ダイアログ',
  EmptyState:'エンプティステート',
};

// --- Node definitions (login.ui) ---
const nodes = {
  'screen':    { tag:'Screen', props:{name:'login'}, text:null },
  'vstack':    { tag:'VStack', props:{gap:'16', padding:'24'}, text:null },
  'text':      { tag:'Text', props:{size:'24', weight:'bold'}, text:'ログイン' },
  'input-email':{ tag:'Input', props:{placeholder:'メールアドレス', width:'100%'}, text:null },
  'input-pw':  { tag:'Input', props:{placeholder:'パスワード', type:'password', width:'100%'}, text:null },
  'button':    { tag:'Button', props:{label:'ログイン', color:'#3B82F6', radius:'8', width:'100%', navigate:'home'}, text:null },
  'link':      { tag:'Link', props:{label:'パスワードを忘れた方', navigate:'reset'}, text:null },
};

const COMMON_PROPS = ['width','height','padding','margin','color','background','radius','border','shadow','opacity'];

const TAG_PROPS = {
  Screen:['name'], VStack:['gap','align','justify'], HStack:['gap','align','justify'],
  Text:['size','weight','align','lineHeight'], Button:['label','variant','navigate','disabled'],
  Input:['placeholder','type','value','disabled'], Link:['label','navigate','href'],
};

const TEXT_TAGS = ['Text','Button','Link','Alert','Badge','Toast','Tag'];

// --- Build ComponentPanel ---
function buildComponentList(filter) {
  const list = document.getElementById('comp-list');
  list.innerHTML = '';
  const q = (filter || '').toLowerCase();
  for (const [cat, tags] of Object.entries(TAG_CATEGORIES)) {
    const filtered = tags.filter(t =>
      !q || t.toLowerCase().includes(q) || (TAG_DESCRIPTIONS[t]||'').includes(filter)
    );
    if (!filtered.length) continue;
    const title = document.createElement('div');
    title.className = 'category-title';
    title.textContent = cat;
    list.appendChild(title);
    for (const tag of filtered) {
      const item = document.createElement('div');
      item.className = 'component-item';
      item.draggable = true;
      item.innerHTML = `<span>${tag}</span><span class="comp-desc">${TAG_DESCRIPTIONS[tag]||''}</span>`;
      item.title = `<${tag}> — ${TAG_DESCRIPTIONS[tag]||''}`;
      list.appendChild(item);
    }
  }
}
buildComponentList('');
document.getElementById('comp-search').addEventListener('input', e => buildComponentList(e.target.value));

// --- Build TreeView ---
function buildTree() {
  const tree = [
    { id:'screen', tag:'Screen', name:'login', depth:0, children:true },
    { id:'vstack', tag:'VStack', name:null, depth:1, children:true },
    { id:'text', tag:'Text', name:null, depth:2, children:false },
    { id:'input-email', tag:'Input', name:null, depth:2, children:false },
    { id:'input-pw', tag:'Input', name:null, depth:2, children:false },
    { id:'button', tag:'Button', name:null, depth:2, children:false },
    { id:'link', tag:'Link', name:null, depth:2, children:false },
  ];
  const container = document.getElementById('tree-content');
  container.innerHTML = '<div style="font-size:12px;"></div>';
  const wrapper = container.firstChild;
  for (const node of tree) {
    const el = document.createElement('div');
    el.className = 'tree-node';
    el.dataset.node = node.id;
    el.style.paddingLeft = (node.depth * 16 + 4) + 'px';
    el.innerHTML = `
      <span class="tree-toggle">${node.children ? '▼' : ''}</span>
      <span class="tree-tag">&lt;${node.tag}&gt;</span>
      ${node.name ? `<span class="tree-name">${node.name}</span>` : ''}
    `;
    el.addEventListener('click', () => selectNode(node.id));
    wrapper.appendChild(el);
  }
}
buildTree();

// --- Tab switching ---
function switchTab(tab) {
  document.getElementById('tab-props').classList.toggle('active', tab === 'props');
  document.getElementById('tab-tree').classList.toggle('active', tab === 'tree');
  document.getElementById('prop-content').style.display = tab === 'props' ? '' : 'none';
  document.getElementById('tree-content').style.display = tab === 'tree' ? '' : 'none';
}

// --- Selection ---
let selectedNodeId = null;

function selectNode(nodeId) {
  // Clear previous
  document.querySelectorAll('.canvas-node.selected').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('.tree-node.selected').forEach(el => el.classList.remove('selected'));

  if (selectedNodeId === nodeId) {
    selectedNodeId = null;
    document.getElementById('prop-content').innerHTML = '<div class="empty-message">要素を選択してプロパティを編集</div>';
    document.getElementById('status-text').textContent = '要素を選択してください';
    return;
  }

  selectedNodeId = nodeId;
  const node = nodes[nodeId];
  if (!node) return;

  // Highlight canvas
  const canvasEl = document.querySelector(`.canvas-node[data-node="${nodeId}"]`);
  if (canvasEl) canvasEl.classList.add('selected');

  // Highlight tree
  const treeEl = document.querySelector(`.tree-node[data-node="${nodeId}"]`);
  if (treeEl) treeEl.classList.add('selected');

  // Status bar
  document.getElementById('status-text').textContent = `<${node.tag}> を選択中`;

  // Build properties
  buildProperties(nodeId, node);
}

function buildProperties(nodeId, node) {
  const container = document.getElementById('prop-content');
  let html = '';

  // Header
  html += `<div class="prop-header"><span>&lt;${node.tag}&gt;</span><button class="delete-btn" title="削除 (Delete)">✕</button></div>`;

  // Text content
  if (TEXT_TAGS.includes(node.tag)) {
    html += `<div class="prop-section-title">CONTENT</div>`;
    html += propRow('text', node.text || node.props.label || '');
  }

  // Tag-specific props
  const tagProps = TAG_PROPS[node.tag] || [];
  if (tagProps.length) {
    html += `<div class="prop-section-title">${node.tag.toUpperCase()}</div>`;
    for (const prop of tagProps) {
      const isColor = prop === 'color';
      html += propRow(prop, node.props[prop] || '', isColor);
    }
  }

  // Style (common props)
  html += `<div class="prop-section-title">STYLE</div>`;
  for (const prop of COMMON_PROPS) {
    const isColor = prop === 'color' || prop === 'background';
    html += propRow(prop, node.props[prop] || '', isColor);
  }

  container.innerHTML = html;
}

function propRow(label, value, isColor) {
  let colorSwatch = '';
  if (isColor && value) {
    colorSwatch = `<input type="color" class="color-swatch" value="${value.startsWith('#') ? value : '#000000'}">`;
  }
  return `<div class="prop-row">
    <label class="prop-label">${label}</label>
    <div class="prop-input-wrapper">
      ${colorSwatch}
      <input type="text" class="prop-input" value="${value}" placeholder="—">
    </div>
  </div>`;
}

// --- Canvas click handlers ---
document.querySelectorAll('.canvas-node').forEach(el => {
  el.addEventListener('click', e => {
    e.stopPropagation();
    selectNode(el.dataset.node);
  });
});

document.getElementById('canvas-area').addEventListener('click', e => {
  if (e.target === e.currentTarget || e.target.classList.contains('canvas-frame')) {
    selectNode(null);
    selectedNodeId = null;
    document.querySelectorAll('.canvas-node.selected').forEach(el => el.classList.remove('selected'));
    document.querySelectorAll('.tree-node.selected').forEach(el => el.classList.remove('selected'));
    document.getElementById('prop-content').innerHTML = '<div class="empty-message">要素を選択してプロパティを編集</div>';
    document.getElementById('status-text').textContent = '要素を選択してください';
  }
});

// Default: select the Button
setTimeout(() => selectNode('button'), 100);
</script>
